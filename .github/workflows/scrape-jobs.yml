name: Scrape FDE Job Count

on:
  schedule:
    - cron: "0 9 * * *"  # daily at 9am UTC (5am EST / 2am PST)
  workflow_dispatch:      # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Playwright
        run: npm install playwright && npx playwright install chromium --with-deps

      - name: Run scraper
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/scrape-jobright.mjs

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-debug
          path: |
            /tmp/jobright-screenshot.png
            /tmp/jobright-page.html
          if-no-files-found: ignore
